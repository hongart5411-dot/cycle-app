<!DOCTYPE html>
<!-- cycleAPP marketing landing page — MOBILE-FIRST build.
     Implemented from the Claude Design project "iPhone 속도계 앱 개발" (CycleLanding.dc.html + PhoneScreen.dc.html).
     Self-contained: no build step, no dependencies. Open index.html in a browser.
     Layout is phone-first and scales UP to desktop via min-width breakpoints. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>cycleAPP — 아이폰이 곧 사이클 컴퓨터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Barlow:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0; background:#0b0b0c;}
  button{font-family:inherit; color:inherit;}
  @keyframes ccspin{to{transform:rotate(360deg);}}
  @keyframes ccpulse{0%,100%{opacity:.35;}50%{opacity:1;}}

  /* ---- layout primitives (mobile defaults) ---- */
  .root{ --gutter:18px; --sec:50px; --maxw:1200px; padding-bottom:86px; }
  .wrap{ width:100%; max-width:var(--maxw); margin:0 auto; padding:0 var(--gutter); }
  .sec{ padding-top:var(--sec); padding-bottom:var(--sec); }
  .bg2{ background:var(--surface2); }

  /* ---- type (fluid, phone-first) ---- */
  .eyebrow{ font-size:12px; font-weight:600; letter-spacing:.12em; color:var(--accent); }
  .h1{ font-family:var(--display); font-weight:800; line-height:1.02; letter-spacing:-.01em; text-transform:var(--htf); margin:0; font-size:clamp(33px,8.6vw,64px); text-wrap:balance; }
  .h2{ font-family:var(--display); font-weight:800; line-height:1.06; text-transform:var(--htf); margin:10px 0 0; font-size:clamp(26px,6.4vw,42px); text-wrap:balance; }
  .lead{ color:var(--muted); line-height:1.55; margin:14px 0 0; font-size:clamp(15px,3.7vw,18px); text-wrap:pretty; }

  /* ---- buttons (48px+ touch targets) ---- */
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px; font-weight:600; font-size:15px; line-height:1; border:0; border-radius:30px; padding:0 22px; min-height:50px; cursor:pointer; }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); }
  .btn-ghost{ background:var(--surface); color:var(--text); border:1px solid var(--line); }
  .btn-block{ width:100%; }
  .btn-sm{ min-height:42px; font-size:14px; padding:0 16px; }

  /* ---- nav ---- */
  .nav{ position:sticky; top:0; z-index:50; background:var(--bg); box-shadow:inset 0 -1px 0 var(--line); }
  .nav-row{ display:flex; align-items:center; justify-content:space-between; height:60px; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand-name{ font-family:var(--display); font-size:20px; font-weight:800; letter-spacing:.01em; }
  .nav-links{ display:none; align-items:center; gap:24px; }
  .nav-link{ font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; }
  .burger{ display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border:1px solid var(--line); border-radius:12px; background:var(--surface); cursor:pointer; }
  .nav-menu{ border-top:1px solid var(--line); padding:6px 0 14px; }
  .nav-mlink{ display:block; padding:14px 2px; font-size:16px; font-weight:600; color:var(--text); border-bottom:1px solid var(--line); cursor:pointer; }

  /* ---- hero ---- */
  .hero{ display:grid; grid-template-columns:1fr; gap:28px; align-items:center; }
  .hero-copy{ order:1; } .hero-art{ order:2; }
  .phone-hero{ width:100%; max-width:300px; margin:0 auto; }
  .badge{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; letter-spacing:.1em; color:var(--accent); margin-bottom:16px; }
  .dot{ width:7px; height:7px; border-radius:9999px; background:var(--accent); display:inline-block; }
  .cta-row{ display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
  .cta-row .btn{ flex:1 1 160px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; }
  .chip{ font-size:12px; font-weight:600; color:var(--muted); border:1px solid var(--line); border-radius:30px; padding:7px 13px; }

  /* ---- live bar ---- */
  .livebar{ background:var(--surface); box-shadow:inset 0 1px 0 var(--line), inset 0 -1px 0 var(--line); }
  .livebar-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px 12px; padding:18px 0; }
  .lv .l{ display:block; font-size:10px; font-weight:600; letter-spacing:.08em; color:var(--muted); }
  .lv .v{ display:block; font-family:'Barlow'; font-weight:800; line-height:1; margin-top:3px; font-size:clamp(24px,6.4vw,32px); }

  /* ---- features ---- */
  .grid-feat{ display:grid; grid-template-columns:1fr; gap:14px; margin-top:28px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; }
  .card .ic{ color:var(--accent); }
  .card .t{ font-size:17px; font-weight:600; margin-top:14px; }
  .card .b{ font-size:14px; line-height:1.55; color:var(--muted); margin:8px 0 0; }

  /* ---- showcase carousel ---- */
  .note{ display:flex; align-items:center; gap:8px; margin-top:16px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .showcase{ display:flex; gap:14px; margin-top:22px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:6px; }
  .showcase::-webkit-scrollbar{ display:none; }
  .sc-item{ flex:0 0 90%; max-width:360px; scroll-snap-align:center; display:flex; flex-direction:column; gap:14px; align-items:center; }
  .sc-item .cap{ text-align:center; }
  .sc-item .cap .t{ font-size:16px; font-weight:600; }
  .sc-item .cap .s{ font-size:13px; color:var(--muted); margin-top:3px; }

  /* ---- sensor split ---- */
  .split{ display:grid; grid-template-columns:1fr; gap:30px; align-items:center; }
  .flow{ width:100%; max-width:330px; margin:0 auto; }
  .feat-list{ display:flex; flex-direction:column; gap:14px; margin-top:24px; max-width:480px; }
  .feat-row{ display:flex; align-items:flex-start; gap:12px; }
  .feat-row .ic{ color:var(--accent); margin-top:1px; }
  .feat-row .t{ font-size:15px; font-weight:600; }
  .feat-row .d{ font-size:13px; color:var(--muted); margin-top:2px; }
  .sensor-actions{ display:flex; align-items:center; gap:14px; margin-top:24px; flex-wrap:wrap; }
  .toggle-row{ display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .toggle{ width:46px; height:26px; border-radius:30px; position:relative; flex:none; }
  .toggle .knob{ position:absolute; top:3px; width:20px; height:20px; border-radius:9999px; background:#fff; transition:left .18s ease; }

  /* ---- performance ---- */
  .perf-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:18px; flex-wrap:wrap; }
  .unit-toggle{ display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .strip{ display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-top:24px; }
  .strip .cell{ background:var(--surface); padding:16px 18px; }
  .strip .cell .k{ font-size:12px; font-weight:600; color:var(--muted); }
  .strip .cell .val{ display:flex; align-items:baseline; gap:5px; margin-top:5px; }
  .strip .cell .num{ font-family:'Barlow'; font-size:clamp(24px,6vw,30px); font-weight:800; }
  .metrics{ display:grid; grid-template-columns:1fr; gap:12px; margin-top:14px; }
  .metric{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .metric .ico{ width:48px; height:48px; border-radius:9999px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex:none; }
  .gauge-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-top:14px; }
  .tabs{ margin-top:26px; border-bottom:1px solid var(--line); display:flex; gap:22px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ cursor:pointer; padding-bottom:12px; position:relative; white-space:nowrap; }
  .tab span{ font-size:15px; font-weight:600; color:var(--text); }
  .tab .ul{ position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); }
  .tabbody{ background:var(--surface); border:1px solid var(--line); border-top:0; border-radius:0 0 var(--radius) var(--radius); padding:24px 20px; min-height:230px; }

  /* ---- export steps ---- */
  .steps{ display:grid; grid-template-columns:1fr; gap:16px; margin-top:28px; }
  .step .n{ font-family:'Barlow'; font-size:30px; font-weight:800; }
  .step .t{ font-size:17px; font-weight:600; margin-top:6px; }
  .step .b{ font-size:14px; line-height:1.5; color:var(--muted); margin:6px 0 0; }

  /* ---- pricing ---- */
  .price-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:30px 26px; margin-top:30px; width:100%; max-width:420px; text-align:center; }
  .price-feats{ display:flex; flex-direction:column; gap:12px; margin-top:22px; text-align:left; }
  .price-feat{ display:flex; align-items:center; gap:10px; font-size:15px; }
  .price-feat .ic{ color:var(--accent); display:inline-flex; flex:none; }

  /* ---- cta / footer ---- */
  .cta{ background:var(--accent); color:var(--accent-ink); padding:clamp(54px,12vw,84px) 0; text-align:center; }
  .cta .h2{ color:var(--accent-ink); }
  .foot{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; padding:30px 0; }
  .foot-links{ display:flex; gap:18px; flex-wrap:wrap; }
  .foot-links span{ font-size:13px; color:var(--muted); }

  /* ---- sticky mobile CTA dock ---- */
  .dock{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(11,11,12,.9); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:10px var(--gutter); padding-bottom:calc(10px + env(safe-area-inset-bottom)); }

  /* ============ enhance upward ============ */
  @media (min-width:600px){
    .grid-feat{ grid-template-columns:1fr 1fr; }
    .metrics{ grid-template-columns:1fr 1fr; }
    .steps{ grid-template-columns:1fr 1fr; }
  }
  @media (min-width:760px){
    .root{ --gutter:28px; --sec:74px; padding-bottom:0; }
    .nav-links{ display:flex; }
    .burger{ display:none; }
    .nav-menu{ display:none !important; }
    .dock{ display:none; }
    .livebar-grid{ grid-template-columns:repeat(6,1fr); padding:22px 0; }
    .strip{ grid-template-columns:repeat(4,1fr); }
    .showcase{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; overflow:visible; }
    .sc-item{ flex:none; max-width:none; }
  }
  @media (min-width:900px){
    .root{ --gutter:32px; }
    .hero{ grid-template-columns:1.08fr .92fr; gap:54px; }
    .phone-hero{ max-width:330px; }
    .cta-row .btn{ flex:0 0 auto; }
    .split{ grid-template-columns:1fr 340px; gap:54px; }
    .grid-feat{ grid-template-columns:repeat(3,1fr); gap:20px; }
    .steps{ grid-template-columns:repeat(4,1fr); gap:20px; }
  }
  @media (min-width:1040px){
    .showcase{ grid-template-columns:repeat(4,1fr); }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

/* ============================================================
   Tweak defaults (from CycleLanding.dc.html data-props)
   ============================================================ */
const props = {
  ridingScreen: '존2 훈련', theme: '다크', accent: '#2f6df6', heroLayout: '스플릿',
  cornerRadius: 16, fontPair: 'Barlow', density: '보통', uppercaseHeadlines: false,
  age: 49, height: 183, weight: 83, ftp: 277, vo2max: 52.7, maxHr: 190, raceRank: 'R3', racePct: 8.5,
  showLiveBar: true, showLogos: true, showPricing: true,
  showSpeed: true, showPower: true, showZone2: true, showTour: true,
  showTrainer: true, showLap: true, showClimb: true, showRace: true,
};

/* ============================================================
   Live state (port of DCLogic.state)
   ============================================================ */
const state = {
  speed: 32, power: 210, cadence: 88, hr: 148, grade: 1.5,
  alt: 60, ascent: 186, dist: 34.16, secs: 4672,
  maxSpeed: 46.6, maxPower: 542, avgPowerV: 205, avgHrV: 151, n: 1500, target: 34,
  histPower: Array.from({length:48},(_,i)=>200+90*Math.sin(i/3)),
  histHr:    Array.from({length:48},(_,i)=>148+14*Math.sin(i/6)),
  lapIdx: 3, lapSecs: 188, lapSumPower: 41000, lapN: 188, lapDist: 2.94, lastLapSecs: 642, lastLapAvg: 248,
  climbTotal: 2400, distToTop: 1480, climbGrade: 7.2,
  wkStepIdx: 3, wkRemain: 168, wkLo: 250, wkHi: 275,
  perfTab: '파워프로필', unitWkg: false,
  sensorState: { power: 'idle', cadence: 'idle', hr: 'idle' }, autoConnect: true,
  flowStep: 'sensors', selectedScreen: 'zone2',
  menuOpen: false,
};

let climbBarsCache = null;
let showcasePaused = false, showcaseT = null;
function pauseShowcase(){ showcasePaused = true; clearTimeout(showcaseT); }
function resumeShowcaseSoon(){ clearTimeout(showcaseT); showcaseT = setTimeout(() => { showcasePaused = false; }, 1400); }

/* ---------- helpers (port of DCLogic helpers) ---------- */
function fmtTime(secs){
  secs = Math.floor(secs);
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), ss = secs%60;
  const p = n => String(n).padStart(2,'0');
  return `${h}:${p(m)}:${p(ss)}`;
}
function ink(hex){
  const c = hex.replace('#','');
  const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) > 150 ? '#111111' : '#ffffff';
}

/* ============================================================
   computeVals — port of DCLogic.renderVals (data only)
   ============================================================ */
function computeVals(){
  const s = state;
  const styl = props.ridingScreen ?? '존2 훈련';
  const theme = props.theme ?? '다크';
  const accent = props.accent ?? '#2f6df6';
  const radius = props.cornerRadius ?? 16;
  const fontPair = props.fontPair ?? 'Barlow';
  const density = props.density ?? '보통';
  const hero = props.heroLayout ?? '스플릿';
  const upper = props.uppercaseHeadlines ?? false;

  const dark = theme === '다크';
  const pal = dark
    ? { bg:'#0b0b0c', surface:'#161618', surface2:'#101012', text:'#ffffff', muted:'#8a8a8d', line:'#262628' }
    : { bg:'#ffffff', surface:'#f7f7f8', surface2:'#f0f0f1', text:'#111111', muted:'#707072', line:'#e3e3e5' };
  const fonts = fontPair === 'Bebas + Inter'
    ? { ui:"'Inter','Noto Sans KR',sans-serif", display:"'Bebas Neue','Noto Sans KR',sans-serif" }
    : fontPair === 'Inter'
    ? { ui:"'Inter','Noto Sans KR',sans-serif", display:"'Inter','Noto Sans KR',sans-serif" }
    : { ui:"'Inter','Noto Sans KR',sans-serif", display:"'Barlow','Noto Sans KR',sans-serif" };
  const pad = density === '여유' ? '112px' : density === '압축' ? '54px' : '84px';
  const variantMap = { '속도 중심':'speed', '파워 중심':'power', '존2 훈련':'zone2', '투어 · 내비':'tour', '로라용':'trainer', '랩 훈련':'lap', '클라이밍':'climb', '레이스 미니멀':'race' };
  const heroVariant = variantMap[styl] || 'zone2';
  const heroDir = hero === '스플릿' ? 'row' : 'column';
  const heroAlign = hero === '스플릿' ? 'center' : hero === '중앙 정렬' ? 'center' : 'flex-start';
  const heroTextAlign = hero === '중앙 정렬' ? 'center' : 'left';
  const heroJustify = hero === '중앙 정렬' ? 'center' : 'flex-start';

  const avg = s.secs > 0 ? s.dist / (s.secs / 3600) : 0;
  const f = Math.min(s.speed / 60, 1);
  const cx = 160, cy = 160, R = 130, th = Math.PI - f * Math.PI;
  const hrV = s.hr;
  const zHr = [['Z1','#3b82f6',114],['Z2','#16a34a',133],['Z3','#eab308',152],['Z4','#f97316',171],['Z5','#ef4444',9999]];
  let hrIdx = zHr.findIndex(z => hrV < z[2]); if (hrIdx < 0) hrIdx = 4;
  const hrZoneColor = zHr[hrIdx][1], hrZone = zHr[hrIdx][0], hrZoneName = zHr[hrIdx][0];
  const zPw = [['Z1','#3b82f6',120],['Z2','#16a34a',200],['Z3','#eab308',260],['Z4','#f97316',320],['Z5','#ef4444',99999]];
  let pwIdx = zPw.findIndex(z => s.power < z[2]); if (pwIdx < 0) pwIdx = 4;
  const mkZones = (arr, idx) => arr.map((z, i) => ({ label: z[0], color: z[1], op: i === idx ? '1' : '0.28', h: i === idx ? '100%' : '50%', hflat: i === idx ? '12px' : '6px' }));
  const hrZones = mkZones(zHr, hrIdx), pwZones = mkZones(zPw, pwIdx);
  const power3s = Math.round(s.histPower.slice(-2).reduce((a, b) => a + b, 0) / Math.min(2, s.histPower.length));
  const wkg = (s.power / (props.weight ?? 83)).toFixed(1);

  if (!climbBarsCache) {
    const g = [5,6,8,7,9,11,8,6,7,10,12,9,6,4];
    const col = x => x < 5 ? '#19c37d' : x < 7 ? '#ffd23f' : x < 10 ? '#ff8a3d' : '#ff3b30';
    climbBarsCache = g.map(x => ({ h: (28 + x * 6).toFixed(0), color: col(x) }));
  }
  const vam = Math.max(0, Math.round(s.speed * 10 * s.climbGrade));
  const elevRem = Math.round(s.distToTop * s.climbGrade / 100);
  const climbMarker = (100 * (1 - s.distToTop / s.climbTotal)).toFixed(1);
  const lapAvg = Math.round(s.lapSumPower / Math.max(1, s.lapN));
  const distToTurn = 80 + (s.secs % 18) * 25;
  const turns = ['우회전', '좌회전', '직진 유지', '합류'];

  const show = {
    speed: props.showSpeed ?? true, power: props.showPower ?? true,
    zone2: props.showZone2 ?? true, tour: props.showTour ?? true,
    trainer: props.showTrainer ?? true, lap: props.showLap ?? true,
    climb: props.showClimb ?? true, race: props.showRace ?? true,
  };
  const visibleCount = Object.values(show).filter(Boolean).length;
  const scCols = Math.min(Math.max(visibleCount, 1), 4);
  const scPhoneMax = { 1: '420px', 2: '340px', 3: '290px', 4: '240px' }[scCols];

  // ===== 내 운동 역량 (My Performance) =====
  const age = props.age ?? 49;
  const height = props.height ?? 183;
  const weight = props.weight ?? 83;
  const ftp = props.ftp ?? 277;
  const vo2max = props.vo2max ?? 52.7;
  const maxHr = props.maxHr ?? 190;
  const raceRank = props.raceRank ?? 'R3';
  const racePct = props.racePct ?? 8.5;
  const ftpWkg = ftp / weight;
  const isWkg = !!s.unitWkg;
  const fmtP = w => isWkg ? (w / weight).toFixed(2) : String(Math.round(w));
  const unitLabel = isWkg ? 'W/kg' : 'watts';
  const ppDefs = [['5초', 3.30], ['1분', 1.66], ['5분', 1.20], ['20분', 1.05], ['FTP', 1.00]];
  const ppMax = Math.round(ftp * 3.30);
  const powerProfile = ppDefs.map(([label, k]) => {
    const w = Math.round(ftp * k);
    return { label, disp: fmtP(w), bar: (w / ppMax * 100).toFixed(0) + '%' };
  });
  const zoneDefs = [['Z1 회복', 22, '#3b82f6'], ['Z2 지구력', 36, '#16a34a'], ['Z3 템포', 16, '#84cc16'], ['Z4 역치', 12, '#eab308'], ['Z5 VO₂', 8, '#f97316'], ['Z6 무산소', 4, '#ef4444'], ['Z7 신경근', 2, '#b91c1c']];
  const zMax = Math.max(...zoneDefs.map(z => z[1]));
  const perfZones = zoneDefs.map(([label, pct, color]) => ({ label, pct: pct + '%', bar: (pct / zMax * 100).toFixed(0) + '%', color }));
  const tssVals = [320, 410, 365, 470, 505, 430, 540, 612];
  const tMax = Math.max(...tssVals);
  const perfTrend = tssVals.map((vv, i) => ({ label: 'W' + (i + 1), bar: (vv / tMax * 100).toFixed(0) + '%', v: vv }));
  const catBands = [[5.0, 'Cat 1 · 엘리트'], [4.5, 'Cat 2 · 상급'], [4.0, 'Cat 3 · 중상급'], [3.25, 'Cat 4 · 중급'], [2.5, 'Cat 5 · 입문 상'], [0, '입문']];
  const catLabel = (catBands.find(b => ftpWkg >= b[0]) || catBands[catBands.length - 1])[1];
  const catLeftPct = Math.max(2, Math.min(98, (ftpWkg - 2) / (6 - 2) * 100)).toFixed(1);

  // ===== 센서 연결 (BLE pairing) =====
  const sensorDefs = [
    { key: 'power', name: '파워 미터', device: 'Favero Assioma', battery: 86, signal: '강함' },
    { key: 'cadence', name: '케이던스', device: 'Magene S3+', battery: 72, signal: '강함' },

    const rows = v.sensorRows.map(sensor => {
      const icon = sensor.isPower
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="#eab308"><path d="M13 2L4 14h7l-1 8 9-12h-7z"></path></svg>'
        : sensor.isCadence

        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="#ef4444"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"></path></svg>';
      const right = sensor.connected
        ? `<div style="display:flex; flex-direction:column; align-items:flex-end; gap:3px;">
                      <span style="display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; color:#16a34a;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3"><path d="M20 6L9 17l-5-5"></path></svg>연결됨</span>
                      <span style="font-size:10px; color:#8a8a8d;">🔋 ${sensor.battery} · 신호 ${sensor.signal}</span>

        : sensor.busy
        ? `<div style="display:flex; align-items:center; gap:7px;">
                      <div style="width:16px; height:16px; border-radius:9999px; border:2px solid #2f6df6; border-top-color:transparent; animation:ccspin 0.7s linear infinite;"></div>
                      <span style="font-size:11px; font-weight:600; color:${sensor.statusColor};">${sensor.statusText}</span>

/* ============================================================
   Paint — full build once, then targeted zone updates
   ============================================================ */
function paintDynamic(v){
  const hp = document.getElementById('hero-phone'); if (hp) hp.innerHTML = renderPhone(v.heroVariant, v);
  const lb = document.getElementById('live-bar');   if (lb) lb.innerHTML = liveBarRow(v);
  const sg = document.getElementById('showcase-grid');
  if (sg && !showcasePaused) { const sl = sg.scrollLeft; sg.innerHTML = showcaseItems(v); sg.scrollLeft = sl; }
  const rp = document.getElementById('ride-phone'); if (rp) rp.innerHTML = renderPhone(state.selectedScreen, v);
}
function paintNav(){
  const n = document.getElementById('nav-bar');
  if (n) n.outerHTML = navHTML(computeVals());
}
function commit(){
  const v = computeVals();
  const si = document.getElementById('sensor-inner'); if (si) si.innerHTML = sensorInner(v);
  const pi = document.getElementById('perf-inner');   if (pi) pi.innerHTML = perfInner(v);
  paintDynamic(v);
}

/* ============================================================
   Sensor pairing logic (port of DCLogic connect/toggle/auto)
   ============================================================ */
let sensorTimers = [];
function setSensor(key, val){ state.sensorState = { ...state.sensorState, [key]: val }; commit(); }
function connectSensor(key, delay){
  sensorTimers.push(setTimeout(() => setSensor(key, 'searching'), delay));
  sensorTimers.push(setTimeout(() => setSensor(key, 'connecting'), delay + 850));
  sensorTimers.push(setTimeout(() => setSensor(key, 'connected'), delay + 1650));
}
function runAutoConnect(){
  sensorTimers.forEach(clearTimeout); sensorTimers = [];
  state.sensorState = { power: 'idle', cadence: 'idle', hr: 'idle' };
  ['power', 'cadence', 'hr'].forEach((k, i) => connectSensor(k, 350 + i * 650));
  commit();
}
function toggleSensor(key){
  const cur = state.sensorState[key];
  if (cur === 'connected' || cur === 'connecting' || cur === 'searching')
    state.sensorState = { ...state.sensorState, [key]: 'idle' };
  else connectSensor(key, 0);
  commit();
}

/* ============================================================
   Event delegation (replaces onClick="{{ handler }}")
   ============================================================ */
function handle(act, arg){
  switch (act) {
    case 'toggleMenu': state.menuOpen = !state.menuOpen; paintNav(); break;
    case 'closeMenu': state.menuOpen = false; paintNav(); break;
    case 'runAutoConnect': runAutoConnect(); break;
    case 'toggleAuto': state.autoConnect = !state.autoConnect; commit(); break;
    case 'toggleSensor': toggleSensor(arg); break;
    case 'goSelect':
      if (Object.values(state.sensorState).filter(x => x === 'connected').length === 3) state.flowStep = 'select';
      commit(); break;
    case 'backToSensors': state.flowStep = 'sensors'; commit(); break;
    case 'startRiding': state.flowStep = 'riding'; commit(); break;
    case 'endRiding': state.flowStep = 'select'; commit(); break;
    case 'pick': state.selectedScreen = arg; commit(); break;
    case 'setTabTrend': state.perfTab = '훈련트렌드'; commit(); break;
    case 'setTabZone': state.perfTab = '훈련영역분석'; commit(); break;
    case 'setTabPower': state.perfTab = '파워프로필'; commit(); break;
    case 'toggleUnit': state.unitWkg = !state.unitWkg; commit(); break;
  }
}

/* ============================================================
   Simulation loop (port of DCLogic.componentDidMount, 120ms)
   ============================================================ */
function tick(){
  const s = state;
  let target = s.target;
  if (Math.random() < 0.12) target = 12 + Math.random() * 32;
  let speed = s.speed + (target - s.speed) * 0.16 + (Math.random() - 0.5) * 2.4;
  if (speed < 0) speed = 0; if (speed > 62) speed = 62;
  const grade = Math.max(-9, Math.min(13, s.grade + (Math.random() - 0.5) * 2.2));
  let power = Math.max(0, Math.min(720, 90 + speed * 5.4 + grade * 9 + (Math.random() - 0.5) * 70));
  const cadence = speed > 3 ? Math.max(50, Math.min(112, Math.round(72 + (speed - 26) * 0.7 + (Math.random() - 0.5) * 8))) : 0;
  const hr = Math.max(95, Math.min(186, s.hr + ((108 + power * 0.13) - s.hr) * 0.05 + (Math.random() - 0.5) * 1.2));
  const dtSim = 2;
  const dAlt = (grade / 100) * (speed * dtSim / 3.6);
  const n = s.n + 1;
  let lapIdx = s.lapIdx, lapSecs = s.lapSecs + dtSim, lapSumPower = s.lapSumPower + power, lapN = s.lapN + 1;
  let lapDist = s.lapDist + speed * (dtSim / 3600), lastLapSecs = s.lastLapSecs, lastLapAvg = s.lastLapAvg;
  if (lapDist >= 5) { lastLapSecs = lapSecs; lastLapAvg = lapSumPower / lapN; lapIdx += 1; lapSecs = 0; lapSumPower = 0; lapN = 0; lapDist = 0; }
  let distToTop = s.distToTop - speed * dtSim / 3.6, climbGrade = Math.max(3.5, Math.min(12, s.climbGrade + (Math.random() - 0.5) * 0.8)), climbTotal = s.climbTotal;
  if (distToTop <= 0) { climbTotal = 1400 + Math.round(Math.random() * 2400); distToTop = climbTotal; climbGrade = 5 + Math.random() * 5; }
  let wkRemain = s.wkRemain - dtSim, wkStepIdx = s.wkStepIdx, wkLo = s.wkLo, wkHi = s.wkHi;
  if (wkRemain <= 0) { wkStepIdx = wkStepIdx >= 6 ? 1 : wkStepIdx + 1; wkRemain = 240; wkLo = 220 + Math.round(Math.random() * 4) * 15; wkHi = wkLo + 25; }
  Object.assign(s, {
    speed, power: Math.round(power), cadence, hr, grade,
    alt: s.alt + dAlt, ascent: s.ascent + (dAlt > 0 ? dAlt : 0), target,
    dist: s.dist + speed * (dtSim / 3600), secs: s.secs + dtSim,
    maxSpeed: Math.max(s.maxSpeed, speed), maxPower: Math.max(s.maxPower, Math.round(power)),
    avgPowerV: s.avgPowerV + (power - s.avgPowerV) / n,
    avgHrV: s.avgHrV + (hr - s.avgHrV) / n, n,
    histPower: s.histPower.slice(-47).concat(power),
    histHr: s.histHr.slice(-47).concat(hr),
    lapIdx, lapSecs, lapSumPower, lapN, lapDist, lastLapSecs, lastLapAvg,
    distToTop, climbGrade, climbTotal, wkRemain, wkStepIdx, wkLo, wkHi,
  });
  paintDynamic(computeVals());
}

/* ============================================================
   Init
   ============================================================ */
const app = document.getElementById('app');
app.innerHTML = buildPage(computeVals());
app.addEventListener('click', e => {
  const el = e.target.closest('[data-act]');
  if (!el) return;
  handle(el.dataset.act, el.dataset.arg);
});
// keep the live showcase from fighting the user's swipe
const sgEl = document.getElementById('showcase-grid');
if (sgEl) {
  sgEl.addEventListener('pointerdown', pauseShowcase);
  sgEl.addEventListener('pointerup', resumeShowcaseSoon);
  sgEl.addEventListener('pointercancel', resumeShowcaseSoon);
  sgEl.addEventListener('wheel', () => { pauseShowcase(); resumeShowcaseSoon(); }, { passive: true });
}
setInterval(tick, 120);
setTimeout(() => { if (state.autoConnect) runAutoConnect(); }, 1000);

/* ===================== cycleAPP: real ride stats from the API (Supabase) =====================
   Pulls aggregate totals from the backend (/api/stats) and shows them under the hero.
   Silently does nothing when the page is opened as a static file (no server / no rides),
   so the marketing demo above still works unchanged. */
(function(){
  const cell = (l,v)=>`<div class="lv"><span class="l">${l}</span><span class="v">${v}</span></div>`;
  const sub  = t=>`<span style="font-size:.5em;font-weight:600;">${t}</span>`;
  function fmtDur(secs){ secs=Math.max(0,Math.floor(secs||0)); const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60); return h>0?`${h}${sub('시간')} ${m}`:`${m}${sub('분')}`; }
  function paint(s){
    const html = `<div class="wrap">
      <div style="display:flex;align-items:center;gap:8px;padding-top:18px;">
        <span class="dot"></span>
        <span style="font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--accent);">내 라이딩 기록 · DB 연동</span>
      </div>
      <div class="livebar-grid" style="padding-top:12px;">
        ${cell('총 라이딩', s.totalRides+sub('회'))}
        ${cell('총 거리 · KM', (s.totalKm||0).toFixed(1))}
        ${cell('총 시간', fmtDur(s.totalSecs))}
        ${cell('누적 상승 · M', Math.round(s.totalAscent||0))}
        ${cell('평균 파워 · W', s.avgPower||0)}
        ${cell('최고 속도 · KM/H', (s.maxSpeed||0).toFixed(1))}
      </div></div>`;
    let strip=document.getElementById('cycle-stats');
    if(!strip){
      strip=document.createElement('div'); strip.className='livebar'; strip.id='cycle-stats';
      const lb=document.querySelector('.livebar'), nav=document.getElementById('nav-bar');
      if(lb&&lb.parentNode) lb.parentNode.insertBefore(strip, lb.nextSibling);
      else if(nav&&nav.parentNode) nav.parentNode.insertBefore(strip, nav.nextSibling);
      else document.getElementById('app').prepend(strip);
    }
    strip.innerHTML=html;
  }
  // token (if any) from URL (#token=/?token=) or localStorage — same key the app uses.
  // The landing stays public: with no/invalid token the API returns 401 and the
  // strip simply stays hidden, so personal totals aren't exposed to visitors.
  function apiToken(){
    try{
      const m=(location.hash+location.search).match(/[#?&]token=([^&]+)/);
      if(m){ const t=decodeURIComponent(m[1]); localStorage.setItem('cycleapp.apiToken',t); history.replaceState(null,'',location.pathname); return t; }
      return localStorage.getItem('cycleapp.apiToken')||'';
    }catch(e){ return ''; }
  }
  async function load(){
    let s;
    const tok=apiToken();
    try{
      const r=await fetch('/api/stats',{cache:'no-store', headers: tok?{'Authorization':'Bearer '+tok}:undefined});
      if(!r.ok) return;                         // 401 (no/invalid token) or no server → leave demo page as-is
      s=await r.json();
    }catch(e){ return; }
    if(!s || !s.totalRides){ const ex=document.getElementById('cycle-stats'); if(ex) ex.remove(); return; }
    paint(s);
  }
  load();
})();
</script>
</body>
